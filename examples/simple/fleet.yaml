# Example: Single Agent with Telegram
#
# Simplest useful configuration:
# - One Codex agent with transparent proxy
# - Telegram channel (bot token injected by proxy)
# - GitHub access with PAT injection
# - Allow all other traffic
#
# Usage:
#   1. Copy this directory
#   2. Create .env with your secrets
#   3. Run: agent-fleet up

fleet:
  name: my-agent

agents:
  - coder

egress-presets:
  telegram-bot-1:
    - host: ["api.telegram.org"]
      provider: "github.com/donbader/agent-fleet/egress-rules/telegram-bot"
      options:
        token: "${TELEGRAM_BOT_TOKEN}"

  main:
    - host: ["api.github.com", "github.com"]
      provider: "github.com/donbader/agent-fleet/egress-rules/github-pat"
      options:
        token: "${GITHUB_PAT_TOKEN}"
    - host: ["*"]
