# Example: Single Agent with Telegram
#
# Simplest useful configuration:
# - One Codex agent
# - Telegram channel (own bot)
# - GitHub access with PAT injection
# - Allow all other traffic
#
# Usage:
#   1. Copy this file to fleet.yaml
#   2. Create .env with your secrets
#   3. Run: agent-fleet up

fleet:
  name: my-agent

agents:
  coder:
    runtime: codex
    gateway: gw-main
    channel:
      provider: "github.com/donbader/agent-fleet/channel-providers/telegram"
      options:
        bot_token_env: TELEGRAM_BOT_TOKEN
        allowed_users: ["@myusername"]
    env:
      GH_TOKEN: proxy_dummy_token

gateways:
  gw-main:
    egress:
      # GitHub with PAT injection
      - host: ["api.github.com", "github.com"]
        auth:
          provider: "github.com/donbader/agent-fleet/auth-providers/github-pat"
          options:
            token_env: GITHUB_PAT_TOKEN

      # Allow all other traffic (no auth injection)
      - host: ["*"]
