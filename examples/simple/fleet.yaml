# Example: Single Agent with Telegram Bridge
#
# This is the simplest useful configuration:
# - One Codex agent
# - Telegram bridge for messaging
# - GitHub access with PAT
# - OpenAI API access for the agent runtime
#
# Usage:
#   1. Copy this file to fleet.yaml
#   2. Create .env with your secrets
#   3. Run: agent-fleet up

fleet:
  name: my-agent

agents:
  coder:
    runtime: codex
    bridge: telegram
    sandbox:
      egress:
        - host: api.github.com
          port: 443
          access: full
        - host: api.openai.com
          port: 443
          access: full
        - host: registry.npmjs.org
          port: 443
          access: read-only
      secrets:
        env_file: .env
        providers:
          - openai
          - github

bridges:
  telegram:
    type: telegram
    token_env: TELEGRAM_BOT_TOKEN
    allowed_chats:
      - 123456789              # Replace with your chat ID
    sessions:
      mode: per-chat
      max_concurrent: 5
      idle_timeout: 30m

secrets:
  providers:
    - name: openai
      type: api-key
      env: OPENAI_API_KEY
      inject:
        header: Authorization
        prefix: "Bearer "
        endpoints:
          - host: api.openai.com

    - name: github
      type: github-pat
      env: GITHUB_TOKEN
