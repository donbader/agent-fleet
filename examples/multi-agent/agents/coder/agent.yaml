# Agent: coder
# Telegram-connected agent via channels-bridge runtime.
# Messages from Telegram are routed to Codex via ACP protocol.

egress: [telegram-bot-coder, github, allow-all]

runtime:
  provider: "github.com/donbader/agent-fleet/runtimes/channels-bridge"
  options:
    agent_cmd: "codex"
    allowed_users: "@your_username"
