# Agent: coder
# Full-featured dev agent with Telegram channel via channels-bridge.
# Messages from Telegram are routed to Codex via ACP protocol.

egress: [telegram-bot-coder, github, allow-all]

runtime:
  provider: "github.com/donbader/agent-fleet/runtimes/channels-bridge"
  options:
    agent_provider: "github.com/donbader/agent-fleet/runtimes/codex"
    channels:
      - provider: "github.com/donbader/agent-fleet/channel-providers/telegram"
        options:
          allowed_users: ["@coreyortea"]
          groups:
            "-100987654321":
              allowed_users: ["*"]
              required_mention: true

env:
  GH_TOKEN: proxy_dummy_token
  LOG_LEVEL: debug
