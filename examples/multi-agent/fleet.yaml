# Example: Multi-Agent Fleet
#
# Two agents with different runtimes:
# - coder: channels-bridge (Telegram ↔ Codex via ACP)
# - reviewer: pure codex (no Telegram, manual login via docker exec)
#
# Each agent has its own Telegram bot (coder only in this example).
# Proxy injects bot token — agent never sees real credentials.
#
# Usage:
#   1. Copy this directory
#   2. Create .env with your secrets (see .env.example)
#   3. Run: agent-fleet up
#   4. Message your Telegram bot to talk to the coder agent

fleet:
  name: dev-team

agents:
  - coder
  - reviewer

egress-presets:
  # Telegram bot for coder (token injected by proxy)
  telegram-bot-coder:
    - host: ["api.telegram.org"]
      provider: "github.com/donbader/agent-fleet/egress-rules/telegram-bot"
      options:
        token: "${TELEGRAM_BOT_TOKEN_CODER}"

  # GitHub with PAT injection
  github:
    - host: ["api.github.com", "github.com"]
      provider: "github.com/donbader/agent-fleet/egress-rules/github-pat"
      options:
        token: "${GITHUB_PAT_TOKEN}"

  # Allow all other traffic (passthrough, no MITM)
  allow-all:
    - host: ["*"]

  # Strict: GitHub + Telegram only, no catch-all
  strict:
    - host: ["api.github.com", "github.com"]
      provider: "github.com/donbader/agent-fleet/egress-rules/github-pat"
      options:
        token: "${GITHUB_PAT_TOKEN}"
    - host: ["api.openai.com"]
