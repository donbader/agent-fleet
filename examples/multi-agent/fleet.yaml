# Example: Multi-Agent Fleet with OAuth MCP + Docker
#
# Advanced configuration:
# - Two agents (coder + reviewer), each with own Telegram bot
# - Shared presets (main) + agent-specific presets
# - OAuth integration (Notion) via /oauth command
# - Docker API Proxy for coder agent
# - Strict egress for reviewer (no catch-all)
#
# Usage:
#   1. Copy this file to fleet.yaml
#   2. Create .env with your secrets
#   3. Run: agent-fleet up
#   4. In Telegram, send "/oauth notion" to authorize Notion

fleet:
  name: dev-team

agents:
  coder:
    runtime: codex
    egress: [telegram-bot-coder, notion-mcp, docker, main]
    channel:
      provider: "github.com/donbader/agent-fleet/channel-providers/telegram"
      options:
        allowed_users: ["@coreyortea"]
        groups:
          "-100987654321":
            allowed_users: ["*"]
            required_mention: true
    env:
      GH_TOKEN: proxy_dummy_token
      LOG_LEVEL: debug

  reviewer:
    runtime: codex
    egress: [telegram-bot-reviewer, github-strict]
    channel:
      provider: "github.com/donbader/agent-fleet/channel-providers/telegram"
      options:
        allowed_users: ["@coreyortea"]
    env:
      GH_TOKEN: proxy_dummy_token

egress-presets:
  # Per-agent Telegram bot presets
  telegram-bot-coder:
    - host: ["api.telegram.org"]
      provider: "github.com/donbader/agent-fleet/egress-rules/telegram-bot"
      options:
        token: "${TELEGRAM_BOT_TOKEN_CODER}"

  telegram-bot-reviewer:
    - host: ["api.telegram.org"]
      provider: "github.com/donbader/agent-fleet/egress-rules/telegram-bot"
      options:
        token: "${TELEGRAM_BOT_TOKEN_REVIEWER}"

  # Notion MCP OAuth
  notion-mcp:
    - endpoint: [https://mcp.notion.com/mcp]
      provider: "github.com/donbader/agent-fleet/egress-rules/mcp-oauth"

  # Docker access
  docker:
    - provider: "github.com/donbader/agent-fleet/egress-rules/docker-api-proxy"
      options:
        max_containers: 5
        disk_quota: "10Gi"
        resources:
          limits:
            memory: "2Gi"
            cpu: "2"

  # Permissive: GitHub + allow all
  main:
    - host: ["api.github.com", "github.com"]
      provider: "github.com/donbader/agent-fleet/egress-rules/github-pat"
      options:
        token: "${GITHUB_PAT_TOKEN}"
    - host: ["*"]

  # Strict: GitHub only, no catch-all
  github-strict:
    - host: ["api.github.com", "github.com"]
      provider: "github.com/donbader/agent-fleet/egress-rules/github-pat"
      options:
        token: "${GITHUB_PAT_TOKEN}"
    - host: ["api.telegram.org"]
    # No catch-all → only GitHub + Telegram reachable
