# Example: Multi-Agent Fleet with OAuth MCP + Docker
#
# Advanced configuration:
# - Two agents (coder + reviewer), each with own Telegram bot
# - Shared gateway
# - OAuth integrations (Notion, Jira) via /oauth command
# - Docker API Proxy for coder agent (separate gateway)
# - Strict egress for reviewer (no catch-all)
#
# Usage:
#   1. Copy this file to fleet.yaml
#   2. Create .env with your secrets
#   3. Run: agent-fleet up
#   4. In Telegram, send "/oauth notion" to authorize Notion
#   5. In Telegram, send "/oauth jira" to authorize Jira

fleet:
  name: dev-team

agents:
  coder:
    runtime: codex
    gateway: gw-coder
    channel:
      provider: "github.com/donbader/agent-fleet/channel-providers/telegram"
      options:
        bot_token_env: TELEGRAM_BOT_TOKEN_CODER
        allowed_users: ["@coreyortea"]
        groups:
          "-100987654321":
            allowed_users: ["*"]
            required_mention: true
    env:
      GH_TOKEN: proxy_dummy_token
      LOG_LEVEL: debug

  reviewer:
    runtime: codex
    gateway: gw-reviewer
    channel:
      provider: "github.com/donbader/agent-fleet/channel-providers/telegram"
      options:
        bot_token_env: TELEGRAM_BOT_TOKEN_REVIEWER
        allowed_users: ["@coreyortea"]
    env:
      GH_TOKEN: proxy_dummy_token

gateways:
  # Coder gateway: full access + Docker + MCP OAuth
  gw-coder:
    egress:
      - host: ["api.github.com", "github.com"]
        provider: "github.com/donbader/agent-fleet/egress-rules/github-pat"
        options:
          token_env: GITHUB_PAT_TOKEN

      - endpoint: [https://mcp.notion.com/mcp, https://mcp.atlassian.com/v1/mcp]
        provider: "github.com/donbader/agent-fleet/egress-rules/mcp-oauth"

      - endpoint: [https://mcp.slack.com/mcp]
        provider: "github.com/donbader/agent-fleet/egress-rules/mcp-token"
        options:
          app_id_env: SLACK_APP_ID
          app_secret_env: SLACK_APP_SECRET

      - provider: "github.com/donbader/agent-fleet/egress-rules/docker-api-proxy"
        options:
          max_containers: 5
          disk_quota: "10Gi"
          resources:
            limits:
              memory: "2Gi"
              cpu: "2"

      # Allow all other traffic (npm, pip, docs, etc.)
      - host: ["*"]

  # Reviewer gateway: strict, only GitHub + Datadog
  gw-reviewer:
    egress:
      - host: ["api.github.com", "github.com"]
        provider: "github.com/donbader/agent-fleet/egress-rules/github-pat"
        options:
          token_env: GITHUB_PAT_TOKEN

      - host: ["*.datadoghq.com"]
        provider: "github.com/donbader/agent-fleet/egress-rules/api-key"
        options:
          key_env: DD_API_KEY
          header: DD-API-KEY

      # Telegram API (channel provider handles its own bot token)
      - host: ["api.telegram.org"]

      # NOTE: No catch-all → strict mode. Only listed hosts are reachable.
