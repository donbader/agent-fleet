# Example: Multi-Agent Fleet with OAuth MCP + Docker
#
# Advanced configuration:
# - Two agents (coder + reviewer), each with own Telegram bot
# - Shared gateway for egress
# - OAuth integrations (Notion, Jira) via /oauth command
# - Docker API Proxy for coder agent
# - Strict egress (no catch-all)
#
# Usage:
#   1. Copy this file to fleet.yaml
#   2. Create .env with your secrets
#   3. Run: agent-fleet up
#   4. In Telegram, send "/oauth notion" to authorize Notion
#   5. In Telegram, send "/oauth jira" to authorize Jira

fleet:
  name: dev-team

agents:
  coder:
    runtime: codex
    gateway: gw-shared
    channel:
      provider: "github.com/donbader/agent-fleet/channel-providers/telegram"
      options:
        bot_token_env: TELEGRAM_BOT_TOKEN_CODER
        allowed_users: ["@coreyortea"]
        groups:
          "-100987654321":
            allowed_users: ["*"]
            required_mention: true
    docker:
      enabled: true
      allowed_images:
        - "node:20-*"
        - "node:22-*"
        - "python:3.12-*"
        - "golang:1.22-*"
        - "postgres:16-*"
        - "redis:7-*"
      max_containers: 5
      resource_limits:
        memory: "2g"
        cpus: "2"
        pids: 256
    env:
      GH_TOKEN: proxy_dummy_token
      LOG_LEVEL: debug

  reviewer:
    runtime: codex
    gateway: gw-shared
    channel:
      provider: "github.com/donbader/agent-fleet/channel-providers/telegram"
      options:
        bot_token_env: TELEGRAM_BOT_TOKEN_REVIEWER
        allowed_users: ["@coreyortea"]
    env:
      GH_TOKEN: proxy_dummy_token

gateways:
  gw-shared:
    egress:
      # GitHub with PAT injection
      - host: ["api.github.com", "github.com"]
        auth:
          provider: "github.com/donbader/agent-fleet/auth-providers/github-pat"
          options:
            token_env: GITHUB_PAT_TOKEN

      # MCP OAuth endpoints (Notion, Jira)
      # Tokens managed via /oauth command in chat
      - endpoint: [https://mcp.notion.com/mcp, https://mcp.atlassian.com/v1/mcp]
        auth:
          provider: "github.com/donbader/agent-fleet/auth-providers/mcp-oauth"

      # MCP with app credentials (Slack)
      - endpoint: [https://mcp.slack.com/mcp]
        auth:
          provider: "github.com/donbader/agent-fleet/auth-providers/mcp-token"
          options:
            app_id_env: SLACK_APP_ID
            app_secret_env: SLACK_APP_SECRET

      # Datadog (read-only monitoring)
      - host: ["*.datadoghq.com"]
        auth:
          provider: "github.com/donbader/agent-fleet/auth-providers/api-key"
          options:
            key_env: DD_API_KEY
            header: DD-API-KEY

      # Package registries (no auth needed)
      - host: ["registry.npmjs.org", "pypi.org", "proxy.golang.org"]

      # Telegram API (channel provider handles its own bot token)
      - host: ["api.telegram.org"]

      # NOTE: No catch-all "- host: ['*']" → strict mode
      # Only the hosts listed above are reachable
